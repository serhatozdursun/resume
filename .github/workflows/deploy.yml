name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  set_maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Enable maintenance mode
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /var/www
            touch /var/www/maintenance.flag
            echo "Maintenance mode enabled."

  deploy:
    runs-on: ubuntu-latest
    needs: set_maintenance
    steps:
      - name: Deploy app
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        env:
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_EMAILJS_SERVICE_ID,NEXT_PUBLIC_EMAILJS_TEMPLATE_ID,NEXT_PUBLIC_EMAILJS_PUBLIC_KEY
          script: |
            set -euo pipefail

            TARGET_DIR="/var/www/resume"

            cd "$TARGET_DIR"

            if [ ! -d .git ]; then
              echo "ERROR: $TARGET_DIR is not a git repository"
              exit 1
            fi

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm use 20

            if ! command -v yarn >/dev/null 2>&1; then
              npm install -g yarn
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            for v in NEXT_PUBLIC_EMAILJS_SERVICE_ID NEXT_PUBLIC_EMAILJS_TEMPLATE_ID NEXT_PUBLIC_EMAILJS_PUBLIC_KEY; do
              if [ -z "${!v:-}" ]; then
                echo "ERROR: $v is empty"
                exit 1
              fi
            done

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            rm -rf .next

            yarn install --frozen-lockfile
            yarn build

            pm2 restart resume || pm2 start "yarn start" --name resume --time
            pm2 save

            echo "Deploy completed successfully."

  disable_maintenance:
    runs-on: ubuntu-latest
    needs:
      - set_maintenance
      - deploy
    if: ${{ always() }}
    steps:
      - name: Disable maintenance mode
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /var/www/maintenance.flag || true
            echo "Maintenance mode disabled."
