name: UI Automation Tests

on:
  pull_request:
    branches:
      - main

jobs:
  browser_e2e_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout resume repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Build and start application
        run: |
          yarn install --frozen-lockfile
          yarn build
          yarn start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Application is ready on http://localhost:3000"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application failed to start"
          exit 1
        env:
          PORT: 3000

      - name: Checkout UI tests
        uses: actions/checkout@v4
        with:
          repository: serhatozdursun/serhatozdursun-ui-tests
          path: serhatozdursun-ui-tests
          fetch-depth: 0
          token: ${{ secrets.UI_TEST_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v2

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Cache WebDriver binaries
        uses: actions/cache@v4
        with:
          path: ~/.wdm
          key: wdm-${{ runner.os }}-${{ matrix.browser }}
          restore-keys: |
            wdm-${{ runner.os }}-

      - name: Install Python dependencies
        working-directory: serhatozdursun-ui-tests
        run: poetry install --no-interaction --only main

      - name: Run UI test healer (${{ matrix.browser }}, localhost)
        working-directory: serhatozdursun-ui-tests
        id: run_tests
        env:
          WDM_LOCAL: '1'
          GH_TOKEN: ${{ secrets.UI_TEST_TOKEN }}
          HEALER_PUSH_PR: 'true'
        run: |
          mkdir -p reports/html reports/screenshots
          poetry run python scripts/ui_test_healer.py \
            --push-pr \
            --browser ${{ matrix.browser }} \
            --base-url http://localhost:3000/

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ matrix.browser }}
          path: serhatozdursun-ui-tests/reports/html
          retention-days: 5
        continue-on-error: true

      - name: Upload XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xml-report-${{ matrix.browser }}
          path: serhatozdursun-ui-tests/reports/report.xml
          retention-days: 5
        continue-on-error: true

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: serhatozdursun-ui-tests/reports/screenshots
          retention-days: 5
        continue-on-error: true

      - name: Send Failure Email for ${{ matrix.browser }}
        if: failure()
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_USER_ID: ${{ secrets.EMAILJS_USER_ID }}
        run: |
          ARTIFACTS_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat <<EOF > email-payload-failure.json
          {
            "service_id": "${EMAILJS_SERVICE_ID}",
            "template_id": "${EMAILJS_TEMPLATE_ID}",
            "user_id": "${EMAILJS_USER_ID}",
            "template_params": {
              "title": "❌ UI Test Failed",
              "result": "failed",
              "browser": "${{ matrix.browser }}",
              "commit": "${{ github.sha }}",
              "artifacts_link": "${ARTIFACTS_LINK}"
            }
            }
          EOF
          curl -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H 'origin: http://localhost' \
            -H 'Content-Type: application/json' \
            -d @email-payload-failure.json

      - name: Send Success Email for ${{ matrix.browser }}
        if: success()
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_USER_ID: ${{ secrets.EMAILJS_USER_ID }}
        run: |
          ARTIFACTS_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat <<EOF > email-payload-success.json
          {
            "service_id": "${EMAILJS_SERVICE_ID}",
            "template_id": "${EMAILJS_TEMPLATE_ID}",
            "user_id": "${EMAILJS_USER_ID}",
            "template_params": {
              "title": "✅ UI Test Passed",
              "result": "passed successfully",
              "browser": "${{ matrix.browser }}",
              "commit": "${{ github.sha }}",
              "artifacts_link": "${ARTIFACTS_LINK}"
            }
          }
          EOF
          curl -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H 'origin: http://localhost' \
            -H 'Content-Type: application/json' \
            -d @email-payload-success.json
